<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compilador — Lenguaje Español</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --accent: #00e5ff;
    --accent2: #7c4dff;
    --success: #00e676;
    --error: #ff4444;
    --warning: #ffab00;
    --text: #e0e0e0;
    --text-dim: #666;
    --mono: 'Space Mono', monospace;
    --ui: 'Inter', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: var(--ui); display: flex; flex-direction: column; }

  .hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .hdr-l { display: flex; align-items: center; gap: 12px; }
  .hdr-icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 7px; display: flex; align-items: center;
    justify-content: center; font-size: 14px;
    box-shadow: 0 0 12px rgba(0,229,255,0.2);
  }
  .hdr-title { font-size: 15px; font-weight: 600; }
  .hdr-sub { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
  .hdr-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--success); font-family: var(--mono); }
  .dot { width: 5px; height: 5px; background: var(--success); border-radius: 50%; box-shadow: 0 0 5px var(--success); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0; flex-wrap: wrap;
  }
  .btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border: none; border-radius: 6px; font-family: var(--ui); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-run { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; font-weight: 600; }
  .btn-run:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-sec { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
  .btn-sec:hover { border-color: var(--accent); color: var(--accent); }
  .divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
  .ex-label { font-size: 11px; color: var(--text-dim); font-family: var(--mono); white-space: nowrap; }
  .ex-btn { padding: 4px 10px; background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
  .ex-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .kbd { padding: 2px 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
  .spinner { width: 12px; height: 12px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.5s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Workspace ocupa todo el espacio restante */
  .workspace {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    min-height: 0; /* CRÍTICO para que flex funcione */
    overflow: hidden;
  }

  .panel {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    min-width: 0; /* CRÍTICO para que no se expanda */
    overflow: hidden;
  }
  .panel:last-child { border-right: none; }

  .panel-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 14px; background: var(--surface2);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .panel-title { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; text-transform: uppercase; }
  .panel-dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-blue { background: var(--accent); }
  .dot-green { background: var(--success); }
  .panel-meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }

  .editor-wrap {
    display: flex;
    flex: 1;
    min-height: 0; /* CRÍTICO */
    overflow: hidden;
  }

  .line-nums {
    padding: 14px 10px;
    font-family: var(--mono); font-size: 12px; line-height: 1.75;
    color: #333; text-align: right; user-select: none;
    min-width: 38px; flex-shrink: 0;
    border-right: 1px solid var(--border); background: var(--surface2);
    overflow: hidden; white-space: pre;
  }

  #editor {
    flex: 1;
    background: transparent; border: none; outline: none;
    resize: none; padding: 14px;
    font-family: var(--mono); font-size: 13px; line-height: 1.75;
    color: var(--text); tab-size: 4;
    overflow: auto; /* scroll en ambas direcciones */
    white-space: pre; /* no hacer wrap */
    word-wrap: normal;
    caret-color: var(--accent);
    min-width: 0;
  }

  #output {
    flex: 1; padding: 14px;
    font-family: var(--mono); font-size: 13px; line-height: 1.75;
    overflow: auto; white-space: pre-wrap; word-break: break-word;
    min-height: 0;
  }

  .out-ph { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text-dim); text-align: center; }
  .out-ph .icon { font-size: 28px; opacity: 0.2; }
  .out-success { color: var(--success); }
  .out-error   { color: var(--error); }
  .out-warn    { color: var(--warning); }
  .out-normal  { color: var(--text); }

  .stdin-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 20px; border-top: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .stdin-label { font-size: 11px; color: var(--text-dim); font-family: var(--mono); white-space: nowrap; }
  #entradas {
    flex: 1; background: transparent; border: none;
    border-bottom: 1px solid var(--border); outline: none;
    color: var(--warning); font-family: var(--mono); font-size: 12px;
    padding: 2px 4px; caret-color: var(--warning);
  }
  #entradas::placeholder { color: #333; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="hdr-icon">⌘</div>
    <div>
      <div class="hdr-title">Compilador</div>
      <div class="hdr-sub">Lenguaje de Programación en Español</div>
    </div>
  </div>
  <div class="hdr-status"><div class="dot"></div>servidor activo</div>
</div>

<div class="toolbar">
  <button class="btn btn-run" id="btnRun" onclick="compilar()">
    <div class="spinner" id="spin"></div>
    <span id="btnTxt">▶ Compilar</span>
  </button>
  <button class="btn btn-sec" onclick="limpiar()">⊘ Limpiar</button>
  <button class="btn btn-sec" id="btnC" onclick="compilarC()" style="border-color:#7c4dff;color:#7c4dff">⚙ Compilar a C</button>
  <span style="font-size:11px;color:var(--text-dim)"><span class="kbd">⌘ Enter</span></span>
  <div class="divider"></div>
  <span class="ex-label">ejemplos:</span>
  <button class="ex-btn" onclick="load('hola')">hola mundo</button>
  <button class="ex-btn" onclick="load('si')">si/sino</button>
  <button class="ex-btn" onclick="load('loop')">mientras</button>
  <button class="ex-btn" onclick="load('func')">función</button>
  <button class="ex-btn" onclick="load('arr')">arreglo</button>
  <button class="ex-btn" onclick="load('input')">ingresar</button>
  <button class="ex-btn" onclick="load('err')" style="color:var(--error)">error</button>
</div>

<div class="workspace">
  <div class="panel">
    <div class="panel-hdr">
      <div class="panel-title"><div class="panel-dot dot-blue"></div>editor</div>
      <div class="panel-meta" id="stats">líneas: 1 · chars: 0</div>
    </div>
    <div class="editor-wrap">
      <div class="line-nums" id="lnums">1</div>
      <textarea id="editor" spellcheck="false"
        placeholder="// escribe tu programa aquí..."
        oninput="onEdit()" onkeydown="onKey(event)"
        onscroll="syncScroll()"></textarea>
    </div>
  </div>

  <div class="panel">
    <div class="panel-hdr">
      <div class="panel-title"><div class="panel-dot dot-green"></div>salida</div>
      <div class="panel-meta" id="outMeta"></div>
    </div>
    <div id="output">
      <div class="out-ph">
        <div class="icon">◈</div>
        <div style="font-size:12px">escribe un programa y presiona<br><strong>Compilar</strong></div>
      </div>
    </div>
  </div>
</div>

<div class="stdin-bar">
  <span class="stdin-label">STDIN — valores para Ingresar():</span>
  <input id="entradas" type="text" placeholder="un valor por línea o separados por espacios  ej: 10 5 3">
</div>

<script>
const EX = {
  hola:  { c: `Programa holamundo(){\n    Imprimir("Hola mundo desde el lenguaje Espanol");\n}`, i: '' },
  si:    { c: `Programa comparar(){\n    entero a;\n    entero b;\n    a=10;\n    b=5;\n    si (a>b){\n        Imprimir("a es mayor: ". a);\n    }delocontrario{\n        Imprimir("b es mayor: ". b);\n    }\n}`, i: '' },
  loop:  { c: `Programa contar(){\n    entero i;\n    i=0;\n    mientras (i<5){\n        Imprimir("iter ". i);\n        i=i+1;\n    }\n}`, i: '' },
  func:  { c: `entero mayor(entero a, entero b, entero c){\n    si (a>b y a>c){\n        retornar(a);\n    }\n    si (b>a y b>c){\n        retornar(b);\n    }\n    retornar(c);\n}\n\nPrograma prueba(){\n    entero r;\n    r=mayor(10, 12, 1);\n    Imprimir("El mayor es: ". r);\n}`, i: '' },
  arr:   { c: `Programa arreglos(){\n    entero nums[5];\n    entero i;\n    nums[0]=10;\n    nums[1]=20;\n    nums[2]=30;\n    i=0;\n    mientras (i<3){\n        Imprimir("nums[". i ."] = ". nums[i]);\n        i=i+1;\n    }\n}`, i: '' },
  input: { c: `Programa sumar(){\n    entero a;\n    entero b;\n    entero r;\n    a=Ingresar("Primer numero");\n    b=Ingresar("Segundo numero");\n    r=a+b;\n    Imprimir("Suma: ". r);\n    si (a>b){\n        Imprimir("Mayor: ". a);\n    }delocontrario{\n        Imprimir("Mayor: ". b);\n    }\n}`, i: '20\n80' },
  err:   { c: `Programa conError(){\n    entero a\n    entero b;\n    a=5;\n}`, i: '' }
};

function load(k) {
  document.getElementById('editor').value = EX[k].c;
  document.getElementById('entradas').value = EX[k].i;
  onEdit();
}

function syncScroll() {
  const ed = document.getElementById('editor');
  document.getElementById('lnums').scrollTop = ed.scrollTop;
}

function onEdit() {
  const ed = document.getElementById('editor');
  const lines = ed.value.split('\n');
  document.getElementById('lnums').textContent = lines.map((_,i)=>i+1).join('\n');
  document.getElementById('stats').textContent = `líneas: ${lines.length} · chars: ${ed.value.length}`;
  syncScroll();
}

function onKey(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ed = document.getElementById('editor');
    const s = ed.selectionStart;
    ed.value = ed.value.substring(0,s) + '    ' + ed.value.substring(s);
    ed.selectionStart = ed.selectionEnd = s + 4;
    onEdit();
  }
}

function limpiar() {
  document.getElementById('editor').value = '';
  document.getElementById('entradas').value = '';
  document.getElementById('output').innerHTML = `<div class="out-ph"><div class="icon">◈</div><div style="font-size:12px">escribe un programa y presiona<br><strong>Compilar</strong></div></div>`;
  document.getElementById('outMeta').textContent = '';
  onEdit();
}

async function compilarC() {
  const codigo = document.getElementById('editor').value.trim();
  if (!codigo) return;
  const entradasRaw = document.getElementById('entradas').value;
  const entradas = entradasRaw.replace(/ +/g, '\n');

  const btn = document.getElementById('btnC');
  btn.disabled = true;
  btn.textContent = '⚙ Compilando...';

  try {
    const res = await fetch('/compilar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ codigo, entradas, modo: 'compilar' })
    });
    const data = await res.json();
    render(data.salida);
  } catch(e) {
    render('Error: no se pudo conectar al servidor.');
  } finally {
    btn.disabled = false;
    btn.textContent = '⚙ Compilar a C';
  }
}

async function compilar() {
  const codigo = document.getElementById('editor').value.trim();
  if (!codigo) return;
  const entradasRaw = document.getElementById('entradas').value;
  const entradas = entradasRaw.replace(/ +/g, '\n');

  const btn = document.getElementById('btnRun');
  const spin = document.getElementById('spin');
  const txt = document.getElementById('btnTxt');
  btn.disabled = true; spin.style.display = 'block'; txt.textContent = 'Compilando...';

  const t0 = Date.now();
  try {
    const res = await fetch('/compilar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ codigo, entradas })
    });
    const data = await res.json();
    document.getElementById('outMeta').textContent = `${Date.now()-t0}ms`;
    render(data.salida);
  } catch(e) {
    render('Error: no se pudo conectar al servidor.\nAsegurate de que servidor.py este corriendo.');
  } finally {
    btn.disabled = false; spin.style.display = 'none'; txt.textContent = '▶ Compilar';
  }
}

function render(txt) {
  const out = document.getElementById('output');
  if (!txt.trim()) { out.innerHTML = '<span style="color:var(--text-dim)">// sin salida</span>'; return; }
  out.innerHTML = txt.split('\n').map(l => {
    if (!l.trim()) return '<br>';
    if (l.includes('exitosa') || l.includes('Sin errores'))
      return `<div class="out-success">✓ ${l}</div>`;
    if (l.includes('Error') || l.includes('fallida'))
      return `<div class="out-error">✗ ${l}</div>`;
    if (l.includes('Sugerencia'))
      return `<div class="out-warn">⚠ ${l}</div>`;
    return `<div class="out-normal">${l}</div>`;
  }).join('');
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') compilar();
});

onEdit();
</script>
</body>
</html>
