<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compilador — Lenguaje Español</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* --- TEMA ORIGINAL (Guardado) ---
      --bg: #0f0f0f;
      --surface: #161616;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --accent: #00e5ff;
      --accent2: #7c4dff;
      --success: #00e676;
      --error: #ff4444;
      --warning: #ffab00;
      --text: #e0e0e0;
      --text-dim: #666;
      --------------------------------- */

      /* --- TEMA NUEVO (Elegante - Midnight Slate) --- */
      --bg: #0f111a;
      /* Fondo muy oscuro y azulado */
      --surface: #151822;
      /* Superficie principal */
      --surface2: #1e2230;
      /* Superficie secundaria (paneles) */
      --border: #2d3345;
      /* Bordes tenues y limpios */
      --accent: #e11d48;
      /* Cerezo (botones primarios, highlights) */
      --accent2: #ea580c;
      /* Cobrizo para gradientes y hovers */
      --success: #10b981;
      /* Verde esmeralda relajante */
      --error: #ef4444;
      /* Rojo mate para errores */
      --warning: #f59e0b;
      /* Ámbar cálido */
      --text: #f8fafc;
      /* Blanco humo muy limpio para lectura */
      --text-dim: #94a3b8;
      /* Gris azulado suave para textos secundarios */

      --mono: 'Space Mono', monospace;
      --ui: 'Inter', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ui);
      display: flex;
      flex-direction: column;
    }

    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .hdr-l {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hdr-icon {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
    }

    .hdr-title {
      font-size: 15px;
      font-weight: 600;
    }

    .hdr-sub {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--mono);
    }

    .hdr-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--success);
      font-family: var(--mono);
    }

    .dot {
      width: 5px;
      height: 5px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 5px var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-family: var(--ui);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-run {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
      font-weight: 600;
    }

    .btn-run:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-run:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-sec {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .btn-sec:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-icon {
      padding: 6px;
      font-size: 14px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .btn-icon:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border);
    }

    .line-num-span {
      display: block;
    }

    .line-num-active {
      color: var(--accent);
      font-weight: bold;
    }

    .divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    .ex-label {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--mono);
      white-space: nowrap;
    }

    .ex-btn {
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .ex-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .ex-select {
      padding: 4px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--ui);
      font-size: 12px;
      cursor: pointer;
      outline: none;
      transition: all 0.15s;
    }

    .ex-select:hover,
    .ex-select:focus {
      border-color: var(--accent2);
    }

    .ex-select option {
      background: var(--surface);
      color: var(--text);
    }

    .kbd {
      padding: 2px 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0, 0, 0, 0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.5s linear infinite;
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Workspace ocupa todo el espacio restante */
    .workspace {
      display: flex;
      flex: 1;
      min-height: 0;
      /* CRÍTICO para que flex funcione */
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      /* CRÍTICO para que no se expanda */
      overflow: hidden;
      flex: 1;
    }

    .panel:first-child {
      border-right: none;
    }

    .resizer {
      width: 4px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.2s;
      z-index: 10;
    }

    .resizer:hover,
    .resizer.dragging {
      background: var(--accent);
    }

    .panel-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .panel-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .dot-blue {
      background: var(--accent);
    }

    .dot-green {
      background: var(--success);
    }

    .panel-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .editor-wrap {
      display: flex;
      flex: 1;
      min-height: 0;
      /* CRÍTICO */
      overflow: hidden;
    }

    .line-nums {
      padding: 14px 10px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.75;
      color: #333;
      text-align: right;
      user-select: none;
      min-width: 38px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--surface2);
      overflow: hidden;
      white-space: pre;
    }

    #editor {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      padding: 14px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.75;
      color: var(--text);
      tab-size: 4;
      overflow: auto;
      /* scroll en ambas direcciones */
      white-space: pre;
      /* no hacer wrap */
      word-wrap: normal;
      caret-color: var(--accent);
      min-width: 0;
    }

    #output {
      flex: 1;
      padding: 14px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.75;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 0;
    }

    .out-ph {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-dim);
      text-align: center;
    }

    .out-ph .icon {
      font-size: 28px;
      opacity: 0.2;
    }

    .out-success {
      color: var(--success);
    }

    .out-error {
      color: var(--error);
    }

    .out-warn {
      color: var(--warning);
    }

    .out-normal {
      color: var(--text);
    }

    .stdin-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .stdin-label {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--mono);
      white-space: nowrap;
    }

    #entradas {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      outline: none;
      color: var(--warning);
      font-family: var(--mono);
      font-size: 12px;
      padding: 2px 4px;
      caret-color: var(--warning);
    }

    #entradas::placeholder {
      color: #333;
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #444;
    }
  </style>
</head>

<body>

  <div class="hdr">
    <div class="hdr-l">
      <!-- ESPACIO PARA LOGOTIPO:
           Reemplaza el 'src' con la ruta de tu logo (ej. "logo.png").
           Si prefieres usar el icono por defecto (⌘), puedes borrar el <img> y descomentar el div de abajo. -->
      <img src="/logo.jpeg" alt="Logo" class="hdr-logo" id="logo-img" style="height: 32px; border-radius: 6px;">
      <!-- <div class="hdr-icon">⌘</div> -->
      <div>
        <div class="hdr-title">Compilador</div>
        <div class="hdr-sub">Lenguaje de Programación en Español</div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn btn-run" id="btnRun" onclick="compilar()">
      <div class="spinner" id="spin"></div>
      <span id="btnTxt">▶ Compilar</span>
    </button>
    <button class="btn btn-sec" onclick="limpiar()">⊘ Limpiar</button>
    <button class="btn btn-sec" id="btnC" onclick="compilarC()" style="border-color:#7c4dff;color:#7c4dff">⚙ Compilar a
      C</button>
    <span style="font-size:11px;color:var(--text-dim)"><span class="kbd">⌘ Enter</span></span>
    <div class="divider"></div>
    <button class="btn btn-icon" onclick="descargarCodigo()" title="Guardar Código a PC">💾</button>
    <button class="btn btn-icon" onclick="document.getElementById('fileInput').click()"
      title="Cargar Archivo Local">📂</button>
    <input type="file" id="fileInput" style="display: none;" accept=".esp,.txt" onchange="cargarCodigo(event)">
    <div class="divider"></div>
    <span class="ex-label">ejemplos:</span>
    <select class="ex-select" id="selectEjemplos" onchange="cargarEjemploServidor(this.value)">
      <option value="" disabled selected>-- Cargando... --</option>
    </select>
  </div>

  <div class="workspace">
    <div class="panel" id="panelEditor">
      <div class="panel-hdr">
        <div class="panel-title">
          <div class="panel-dot dot-blue"></div>editor
        </div>
        <div class="panel-meta" id="stats">líneas: 1 · chars: 0</div>
      </div>
      <div class="editor-wrap">
        <div class="line-nums" id="lnums"><span class="line-num-span line-num-active">1</span></div>
        <textarea id="editor" spellcheck="false" placeholder="// escribe tu programa aquí..." oninput="onEdit()"
          onkeydown="onKey(event)" onkeyup="updateActiveLine()" onclick="updateActiveLine()"
          onscroll="syncScroll()"></textarea>
      </div>
    </div>

    <div class="resizer" id="resizer"></div>

    <div class="panel">
      <div class="panel-hdr">
        <div class="panel-title">
          <div class="panel-dot dot-green"></div>salida
        </div>
        <div class="panel-meta" id="outMeta"></div>
      </div>
      <div id="output">
        <div class="out-ph">
          <div class="icon">◈</div>
          <div style="font-size:12px">escribe un programa y presiona<br><strong>Compilar</strong></div>
        </div>
      </div>
    </div>
  </div>

  <div class="stdin-bar">
    <span class="stdin-label">STDIN — valores para Ingresar():</span>
    <input id="entradas" type="text" placeholder="un valor por línea o separados por espacios  ej: 10 5 3">
  </div>

  <script>
    async function cargarEjemploServidor(archivo) {
      if (!archivo) return;
      try {
        const res = await fetch('/archivo/' + archivo);
        const codigo = await res.text();
        document.getElementById('editor').value = codigo;
        document.getElementById('entradas').value = '';
        onEdit();
      } catch(e) {
        console.error('Error cargando archivo:', e);
      }
      document.getElementById('selectEjemplos').selectedIndex = 0;
    }

    async function cargarListaEjemplos() {
      try {
        const res = await fetch('/ejemplos');
        const data = await res.json();
        const select = document.getElementById('selectEjemplos');
        select.innerHTML = '<option value="" disabled selected>-- Elige un programa --</option>';
        data.archivos.forEach(archivo => {
          const option = document.createElement('option');
          option.value = archivo;
          option.textContent = archivo.replace('.es', '');
          select.appendChild(option);
        });
      } catch(e) {
        console.error('Error cargando ejemplos:', e);
      }
    }

    function syncScroll() {
      const ed = document.getElementById('editor');
      document.getElementById('lnums').scrollTop = ed.scrollTop;
    }

    function updateActiveLine() {
      const ed = document.getElementById('editor');
      const lines = ed.value.split('\n');
      const cursorLine = ed.value.substr(0, ed.selectionStart).split('\n').length;

      const lnumsHTML = lines.map((_, i) => {
        const num = i + 1;
        return `<span class="line-num-span ${num === cursorLine ? 'line-num-active' : ''}">${num}</span>`;
      }).join('');

      document.getElementById('lnums').innerHTML = lnumsHTML;
    }

    function onEdit() {
      const ed = document.getElementById('editor');
      const lines = ed.value.split('\n');
      document.getElementById('stats').textContent = `líneas: ${lines.length} · chars: ${ed.value.length}`;
      updateActiveLine();
      syncScroll();
    }

    function onKey(e) {
      const ed = document.getElementById('editor');
      const s = ed.selectionStart;
      const e_end = ed.selectionEnd;

      if (e.key === 'Tab') {
        e.preventDefault();
        ed.value = ed.value.substring(0, s) + '    ' + ed.value.substring(e_end);
        ed.selectionStart = ed.selectionEnd = s + 4;
        onEdit();
      }

      // Autocierre de pares
      const pairs = { '(': ')', '{': '}', '[': ']', '"': '"', "'": "'" };
      if (pairs[e.key]) {
        e.preventDefault();
        const char = e.key;
        const closeChar = pairs[char];
        ed.value = ed.value.substring(0, s) + char + closeChar + ed.value.substring(e_end);
        ed.selectionStart = ed.selectionEnd = s + 1;
        onEdit();
      }
    }

    function descargarCodigo() {
      const codigo = document.getElementById('editor').value;
      if (!codigo) return;
      const blob = new Blob([codigo], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'programa.esp';
      a.click();
      URL.revokeObjectURL(url);
    }

    function cargarCodigo(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        document.getElementById('editor').value = e.target.result;
        onEdit();
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // Resizer logic
    const resizer = document.getElementById('resizer');
    const panelEditor = document.getElementById('panelEditor');
    let isDragging = false;

    resizer.addEventListener('mousedown', function (e) {
      isDragging = true;
      resizer.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
    });

    document.addEventListener('mousemove', function (e) {
      if (!isDragging) return;
      const containerWidth = document.querySelector('.workspace').clientWidth;
      let newWidth = (e.clientX / containerWidth) * 100;
      if (newWidth < 10) newWidth = 10;
      if (newWidth > 90) newWidth = 90;
      panelEditor.style.flex = `0 0 ${newWidth}%`;
    });

    document.addEventListener('mouseup', function (e) {
      if (isDragging) {
        isDragging = false;
        resizer.classList.remove('dragging');
        document.body.style.cursor = 'default';
      }
    });

    function limpiar() {
      document.getElementById('editor').value = '';
      document.getElementById('entradas').value = '';
      document.getElementById('output').innerHTML = `<div class="out-ph"><div class="icon">◈</div><div style="font-size:12px">escribe un programa y presiona<br><strong>Compilar</strong></div></div>`;
      document.getElementById('outMeta').textContent = '';
      onEdit();
    }

    async function compilarC() {
      const codigoRaw = document.getElementById('editor').value.trim();
      if (!codigoRaw) return;
      const codigo = normalizarCodigo(codigoRaw);
      const entradasRaw = document.getElementById('entradas').value;
      const entradas = entradasRaw.replace(/ +/g, '\n');

      const btn = document.getElementById('btnC');
      btn.disabled = true;
      btn.textContent = '⚙ Compilando...';

      try {
        const res = await fetch('/compilar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ codigo, entradas, modo: 'compilar' })
        });
        const data = await res.json();
        render(data.salida);
      } catch (e) {
        render('Error: no se pudo conectar al servidor.');
      } finally {
        btn.disabled = false;
        btn.textContent = '⚙ Compilar a C';
      }
    }

    function normalizarCodigo(codigo) {
      return codigo
        .replace(/\bprograma\b/gi, 'Programa')
        .replace(/\bimprimir\b/gi, 'Imprimir')
        .replace(/\bingresar\b/gi, 'Ingresar');
    }

    async function compilar() {
      const codigoRaw = document.getElementById('editor').value.trim();
      if (!codigoRaw) return;
      const codigo = normalizarCodigo(codigoRaw);
      const entradasRaw = document.getElementById('entradas').value;
      const entradas = entradasRaw.replace(/ +/g, '\n');

      const btn = document.getElementById('btnRun');
      const spin = document.getElementById('spin');
      const txt = document.getElementById('btnTxt');
      btn.disabled = true; spin.style.display = 'block'; txt.textContent = 'Compilando...';

      const t0 = Date.now();
      try {
        const res = await fetch('/compilar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ codigo, entradas })
        });
        const data = await res.json();
        document.getElementById('outMeta').textContent = `${Date.now() - t0}ms`;
        render(data.salida);
      } catch (e) {
        render('Error: no se pudo conectar al servidor.\nAsegurate de que servidor.py este corriendo.');
      } finally {
        btn.disabled = false; spin.style.display = 'none'; txt.textContent = '▶ Compilar';
      }
    }

    function render(txt) {
      const out = document.getElementById('output');
      if (!txt.trim()) { out.innerHTML = '<span style="color:var(--text-dim)">// sin salida</span>'; return; }
      out.innerHTML = txt.split('\n').map(l => {
        if (!l.trim()) return '<br>';
        if (l.includes('exitosa') || l.includes('Sin errores'))
          return `<div class="out-success">✓ ${l}</div>`;
        if (l.includes('Error') || l.includes('fallida'))
          return `<div class="out-error">✗ ${l}</div>`;
        if (l.includes('Sugerencia'))
          return `<div class="out-warn">⚠ ${l}</div>`;
        return `<div class="out-normal">${l}</div>`;
      }).join('');
    }

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') compilar();
    });

    onEdit();
    cargarListaEjemplos();
  </script>
</body>

</html>
